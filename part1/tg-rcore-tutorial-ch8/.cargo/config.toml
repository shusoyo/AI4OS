# 交叉编译目标：RISC-V 64 位裸机
[build]
target = "riscv64gc-unknown-none-elf"

# QEMU 运行配置
# 使用 qemu-system-riscv64 运行编译产物
# -machine virt        ：QEMU virt 虚拟机平台
# -nographic           ：无图形界面，输出到终端
# -bios none           ：不使用 BIOS（内核直接启动）
# -drive ...           ：挂载 easy-fs 磁盘镜像（包含用户程序）
# -device ...          ：VirtIO 块设备
# -kernel              ：内核 ELF 文件
[target.riscv64gc-unknown-none-elf]
runner = [
    "qemu-system-riscv64",
    "-machine",
    "virt",
    "-nographic",
    "-bios",
    "none",
    "-drive",
    "file=target/riscv64gc-unknown-none-elf/debug/fs.img,if=none,format=raw,id=x0",
    "-device",
    "virtio-blk-device,drive=x0,bus=virtio-mmio-bus.0",
    "-kernel",
]

# tg-user 用户态库的配置，由 build.rs 读取
# TG_USER_CRATE   : cargo clone 时使用的 crates.io 包名
# TG_USER_LOCAL_DIR: 本地缓存目录名（位于 chN/ 下）
# TG_USER_VERSION : 目标版本号
[env]
TG_USER_CRATE     = "tg-rcore-tutorial-user"
TG_USER_LOCAL_DIR = "tg-rcore-tutorial-user"
TG_USER_VERSION   = "0.4.5"
